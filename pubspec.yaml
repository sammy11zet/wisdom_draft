name: wisdom_draft
description: GES Art Studio & Foundation Learning Game
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  google_fonts: ^6.1.0
  animations: ^2.0.1
  firebase_core: ^2.20.0
  cloud_firestore: ^4.9.0

  # Audio
  audioplayers: ^6.0.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Hive generator (optional but useful later)
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
