<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coinGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE97C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Main coin circle -->
  <circle cx="32" cy="32" r="30" fill="url(#coinGradient)" />
  <!-- Coin border shadow -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#8B7500" stroke-width="2" />
  <!-- Shine highlight -->
  <ellipse cx="24" cy="20" rx="8" ry="10" fill="white" opacity="0.3" />
  <!-- Dollar sign or decorative element -->
  <g transform="translate(32, 32)">
    <text x="0" y="8" font-size="20" font-weight="bold" fill="#8B7500" text-anchor="middle" font-family="Arial">$</text>
  </g>
</svg>
